<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - hAIre 招募管理系統</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page" style="display:flex">
  <div class="login-container">
    <div class="login-header">
      <h1>hAIre</h1>
      <p>招募管理系統</p>
    </div>
    <div class="login-body">
      <h2>Sign in</h2>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="login-btn">Sign in</button>
      </form>
      <div class="login-footer">
        <p>Powered by <strong>hAIre</strong> Recruitment System</p>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      // Demo: redirect to dashboard
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
