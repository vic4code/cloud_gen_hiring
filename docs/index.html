  <!-- Main Content -->
  <main class="main-content">
    <div class="dashboard-hero">
      <h1>hAIre 招募管理系統</h1>
      <p>智慧招募，精準配對</p>
    </div>

    <div class="stats-grid" id="statsGrid"></div>
    <div class="features-grid" id="featuresGrid"></div>
  </main>

  <script src="js/mock-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    const statsData = [
      { label: '團隊數量', value: MOCK_STATS.teams, icon: 'teams', cls: 'teams' },
      { label: '活躍職缺', value: MOCK_STATS.activeJobs, icon: 'jobs', cls: 'jobs' },
      { label: '履歷數量', value: MOCK_STATS.resumes, icon: 'resumes', cls: 'resumes' },
      { label: '成功配對', value: MOCK_STATS.matches, icon: 'matches', cls: 'matches' }
    ];

    const statIcons = {
      teams: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      jobs: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
      resumes: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
      matches: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
    };

    document.getElementById('statsGrid').innerHTML = statsData.map(s => `
      <div class="stat-card">
        <div class="stat-icon ${s.cls}">${statIcons[s.icon]}</div>
        <div class="stat-info">
          <h3>${s.value}</h3>
          <p>${s.label}</p>
        </div>
      </div>
    `).join('');

    const features = [
      {
        title: '團隊管理',
        desc: '管理公司團隊組織架構，建立部門與團隊資訊，支援多公司多部門的階層式管理。',
        cls: 'teams',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
        link: 'admin-teams.html'
      },
      {
        title: '職缺管理',
        desc: '建立與管理職缺資訊，透過 AI 智慧配對系統自動媒合最佳候選人，提供推薦分數與原因。',
        cls: 'jobs',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
        link: 'admin-jobs.html'
      },
      {
        title: '履歷管理',
        desc: '上傳與解析候選人履歷，自動提取關鍵資訊並建立向量索引，支援智慧語意搜尋與比對。',
        cls: 'resumes',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
        link: 'admin-resumes.html'
      }
    ];

    document.getElementById('featuresGrid').innerHTML = features.map(f => `
      <div class="feature-card">
        <div class="feature-card-icon ${f.cls}">${f.icon}</div>
        <h3>${f.title}</h3>
        <p>${f.desc}</p>
        <a href="${f.link}" class="btn btn-primary">進入管理</a>
      </div>
    `).join('');
  </script>
</body>
</html>
