  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>職缺管理</h1>
        <p class="subtitle">管理職缺與查看候選人配對結果</p>
      </div>
    </div>

    <!-- Job Selector -->
    <div class="toolbar">
      <select class="filter-select" id="jobSelect" onchange="loadJob()" style="max-width:500px;flex:1">
        <option value="">-- 請選擇職缺 --</option>
      </select>
    </div>

    <!-- Job Header Card -->
    <div class="job-header-card" id="jobHeaderCard" style="display:none">
      <div class="job-header-info">
        <h2 id="jobTitle"></h2>
        <div class="job-meta" id="jobMeta"></div>
      </div>
      <div>
        <span class="team-card-badge" id="jobStatus">active</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="job-tabs" id="jobTabs" style="display:none">
      <button class="job-tab active" data-tab="candidates">候選人配對</button>
      <button class="job-tab" data-tab="details">職缺詳情</button>
    </div>

    <!-- Candidates Section -->
    <div class="candidates-section" id="candidatesSection" style="display:none">
      <h3>推薦候選人 <span class="count" id="candidateCount">0</span></h3>
      <div id="candidatesList"></div>
    </div>

    <!-- Job Details Section -->
    <div id="detailsSection" style="display:none">
      <div class="candidate-card">
        <h3 style="margin-bottom:16px">職缺詳情</h3>
        <div id="jobDetails"></div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      <h3>請選擇一個職缺</h3>
      <p>從上方下拉選單中選擇職缺以查看候選人配對結果</p>
    </div>
  </main>

  <script src="js/mock-data.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Populate job selector
    const jobSelect = document.getElementById('jobSelect');
    MOCK_JOBS.forEach(j => {
      const opt = document.createElement('option');
      opt.value = j.job_id;
      opt.textContent = `${j.job_title} - ${j.company}`;
      jobSelect.appendChild(opt);
    });

    // Tab switching
    document.querySelectorAll('.job-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.job-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tabName = this.dataset.tab;
        document.getElementById('candidatesSection').style.display = tabName === 'candidates' ? 'block' : 'none';
        document.getElementById('detailsSection').style.display = tabName === 'details' ? 'block' : 'none';
      });
    });

    function loadJob() {
      const jobId = jobSelect.value;
      if (!jobId) {
        document.getElementById('jobHeaderCard').style.display = 'none';
        document.getElementById('jobTabs').style.display = 'none';
        document.getElementById('candidatesSection').style.display = 'none';
        document.getElementById('detailsSection').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
        return;
      }

      const job = MOCK_JOBS.find(j => j.job_id === jobId);
      if (!job) return;

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('jobHeaderCard').style.display = 'flex';
      document.getElementById('jobTabs').style.display = 'flex';

      // Reset to candidates tab
      document.querySelectorAll('.job-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-tab="candidates"]').classList.add('active');
      document.getElementById('candidatesSection').style.display = 'block';
      document.getElementById('detailsSection').style.display = 'none';

      // Job header
      document.getElementById('jobTitle').textContent = job.job_title;
      document.getElementById('jobStatus').textContent = job.status === 'active' ? '招募中' : '已關閉';

      const salaryText = job.salary_max
        ? `${(job.salary_min/1000).toFixed(0)}K - ${(job.salary_max/1000).toFixed(0)}K`
        : `${(job.salary_min/1000).toFixed(0)}K 起`;

      document.getElementById('jobMeta').innerHTML = `
        <div class="job-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="9" y1="6" x2="9" y2="6"/><line x1="15" y1="6" x2="15" y2="6"/><line x1="9" y1="10" x2="9" y2="10"/><line x1="15" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="9" y2="14"/><line x1="15" y1="14" x2="15" y2="14"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
          ${job.company}
        </div>
        <div class="job-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          ${job.team_name}
        </div>
        <div class="job-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${job.location}
        </div>
        <div class="job-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${job.employment_type}
        </div>
        <div class="job-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          ${salaryText}
        </div>
      `;

      // Job details
      document.getElementById('jobDetails').innerHTML = `
        <div style="margin-bottom:16px">
          <div class="candidate-section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            必備技能
          </div>
          <div class="skills-tags">
            ${job.required_skills.map(s => `<span class="skill-tag match">${s}</span>`).join('')}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><strong>最低經驗:</strong> ${job.min_experience_years} 年</div>
          <div><strong>學歷要求:</strong> ${job.education_required || '不拘'}</div>
          <div><strong>工作地點:</strong> ${job.location}</div>
          <div><strong>聘用類型:</strong> ${job.employment_type}</div>
        </div>
      `;

      // Candidates
      const candidates = MOCK_CANDIDATES[jobId] || [];
      document.getElementById('candidateCount').textContent = candidates.length;

      if (candidates.length === 0) {
        document.getElementById('candidatesList').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <h3>尚無配對的候選人</h3>
            <p>系統尚未找到適合此職缺的候選人</p>
          </div>`;
        return;
      }

      document.getElementById('candidatesList').innerHTML = candidates
        .sort((a, b) => b.score - a.score)
        .map(c => renderCandidateCard(c, job))
        .join('');
    }

    function renderCandidateCard(candidate, job) {
      const scoreClass = getScoreClass(candidate.score);
      const initials = getInitials(candidate.name);
      const matchedSkills = candidate.skills.filter(s =>
        job.required_skills.some(rs => s.toLowerCase().includes(rs.toLowerCase()) || rs.toLowerCase().includes(s.toLowerCase()))
      );

      return `
        <div class="candidate-card">
          <div class="candidate-header">
            <div class="candidate-info">
              <div class="candidate-avatar">${initials}</div>
              <div>
                <div class="candidate-name">${candidate.name}</div>
                <div class="candidate-title">${candidate.title}</div>
                <div class="candidate-contact">
                  <div class="candidate-contact-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    ${candidate.email}
                  </div>
                  <div class="candidate-contact-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    ${candidate.phone}
                  </div>
                </div>
              </div>
            </div>
            <div class="candidate-score">
              <div class="candidate-score-label">推薦指數</div>
              <div class="candidate-score-value ${scoreClass}">${candidate.score}</div>
            </div>
          </div>

          <div class="candidate-body">
            <div>
              <div class="candidate-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                工作經歷
              </div>
              ${candidate.experience.map(exp => `
                <div class="candidate-experience-item">
                  <div class="candidate-exp-company">${exp.company}</div>
                  <div class="candidate-exp-role">${exp.role}</div>
                  <div class="candidate-exp-duration">${exp.duration} (${exp.months} 個月)</div>
                </div>
              `).join('')}
            </div>
            <div>
              <div class="candidate-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                技能
              </div>
              <div class="skills-tags">
                ${candidate.skills.map(s => {
                  const isMatch = matchedSkills.includes(s);
                  return `<span class="skill-tag ${isMatch ? 'match' : ''}">${s}</span>`;
                }).join('')}
              </div>
            </div>
          </div>

          <div class="candidate-reason">
            <div class="candidate-reason-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg>
              推薦原因
            </div>
            <p>${candidate.reason}</p>
          </div>
        </div>
      `;
    }

    // Auto-select first job if available
    if (MOCK_JOBS.length > 0) {
      jobSelect.value = MOCK_JOBS[0].job_id;
      loadJob();
    }
  </script>
</body>
